<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#0E0B1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Her Little Lexicon">
<title>Her Little Lexicon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">

<!-- Preload every background illustration in parallel so the
     screen-swap doesn't pause on a fresh download.                -->
<link rel="preload" as="image" href="assets/bg-cover.png">
<link rel="preload" as="image" href="assets/bg-stage.png">
<link rel="preload" as="image" href="assets/bg-result.png">
<link rel="preload" as="image" href="assets/bg-note.png">
<link rel="preload" as="image" href="assets/banner.png">

<link rel="stylesheet" href="styles.css?v=15">
</head>
<body>

<!-- Fixed atmospheric layer that sits behind every screen.  We swap
     its background-image via a body class (bg-cover / bg-stage / ...)
     so the illustration stays put while the actual page content
     scrolls over it.                                                 -->
<div id="bg-layer"></div>

<!-- Fixed banner at the very top of every screen. -->
<header id="banner-top">
  <img src="assets/banner.png" alt="Her Little Lexicon">
</header>

<!-- ===== App shell. Each <section> is one screen. =====
     Cover is the hub. Game flow is strictly linear; note + index
     are cover-side pages, not in the game flow. -->
<div id="app">

  <!-- Cover hub (the home) -->
  <section id="screen-cover"   class="screen"></section>

  <!-- Game flow: stage 1 → stage 2 → stage 3 -->
  <section id="screen-stage1"        class="screen"></section>
  <section id="screen-stage1-result" class="screen"></section>
  <section id="screen-stage2"        class="screen"></section>
  <section id="screen-stage2-result" class="screen"></section>
  <section id="screen-stage3"        class="screen"></section>
  <section id="screen-stage3-result" class="screen"></section>

  <!-- Cover-side: archive + word index -->
  <section id="screen-note"  class="screen"></section>
  <section id="screen-index" class="screen"></section>

  <!-- Vocab card detail (opened from note / index with the tarot flip) -->
  <section id="screen-card" class="screen"></section>

</div>

<!-- Modal layer -->
<div id="modal" class="modal-veil"></div>

<!-- Data + BGM + App  ----- loaded in order.  Query-string cache-buster
     forces the CDN edge to fetch the latest after every push.        -->
<script src="data.js?v=14"></script>
<script src="bgm.js?v=14"></script>
<script src="app.js?v=14"></script>

</body>
</html>
